<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOOX Pro 온보딩 프로모션 · 클릭 프로토타입</title>
  <link rel="stylesheet" href="css/prototype.css" />
</head>
<body>
  <!-- 상단 툴바: 화면 전환 -->
  <div class="toolbar">
    <div class="brand"><span class="inf">∞</span> TetherMax</div>
    <div class="tabs" id="tabs">
      <button class="tab" data-screen="s1">S1 · 출금 완료</button>
      <button class="tab" data-screen="s2">S2 · 캐시백 프리뷰</button>
      <button class="tab" data-screen="login">로그인</button>
      <button class="tab" data-screen="signup">회원가입</button>
      <button class="tab" data-screen="mweb">모바일-로그인 전</button>
      <button class="tab" data-screen="mypage">마이페이지</button>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" id="btn-lang" title="한/영 전환" style="width:auto;padding:0 14px;font-weight:700">한국어</button>
    <button class="icon-btn" id="btn-drawer" title="시나리오 패널">⚙︎</button>
  </div>

  <!-- 화면 스테이지 -->
  <div class="stage" id="stage"></div>

  <!-- 토스트 -->
  <div class="toast-wrap" id="toasts"></div>

  <!-- 모달 마운트 -->
  <div id="modal-root"></div>

  <!-- 시나리오 드로어 -->
  <div class="drawer" id="drawer"></div>
  <button class="fab" id="fab">시나리오 ⚙︎</button>

  <script src="js/i18n.js"></script>
  <script src="js/mock-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
